#============================================================
# Application Management Module Configuration
#============================================================

# Application name
spring.application.name=application-management

# Server settings
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1

#============================================================
# Database Configuration
#============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:openapp}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# HikariCP Connection Pool Configuration
spring.datasource.hikari.pool-name=HikariPool-application-management
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#============================================================
# Redis Configuration
#============================================================
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DATABASE:0}
spring.redis.timeout=10000ms

# Lettuce Connection Pool Configuration  
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

#============================================================
# MyBatis Configuration
#============================================================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.openapp.application.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.lazy-loading-enabled=true
mybatis.configuration.aggressive-lazy-loading=false
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumOrdinalTypeHandler

# MyBatis-Plus Configuration  
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.openapp.application.domain
mybatis-plus.global-config.db-config.id-type=ASSIGN_UUID
mybatis-plus.global-config.db-config.logic-delete-field=deletedAt
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.global-config.db-config.table-underline=true
mybatis-plus.global-config.banner=false
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

#============================================================
# Security Configuration
#============================================================
spring.security.user.name=admin
spring.security.user.password=changeme

#============================================================
# JWT Configuration
#============================================================
app.jwt.secret=${JWT_SECRET:defaultSecretKeyForApplicationManagementModule1234567890}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

#============================================================
# Logging Configuration
#============================================================
logging.level.root=INFO
logging.level.com.openapp.application=DEBUG
logging.level.com.openapp.application.mapper=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#============================================================
# Actuator Configuration
#============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

#============================================================
# Custom Application Properties
#============================================================
app.version=1.0.0
app.description=Application Management Service
app.upload.path=./uploads
app.upload.max-size=10MB
app.upload.extensions=.jpg,.jpeg,.png,.gif,.pdf,.doc,.docx

#============================================================
# Profiles Configuration
#============================================================
spring.profiles.active=dev
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=NON_NULL

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8