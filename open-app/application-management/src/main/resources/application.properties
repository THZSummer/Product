# Application Management Application Configuration
# This file contains externalized configuration properties

## Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

## Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/openapp?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

## JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

## MyBatis Configuration
mybatis.type-aliases-package=com.openapp.application.domain
mybatis.configuration.map-underscore-to-camel-case=true

## Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

## Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=schema_version
spring.flyway.validate-on-migrate=true

## JWT Security Configuration
app.jwt.secret=mySecretKey123456789012345678901234567890  # Should be 43+ characters
app.jwt.expiration=86400000  # 24 hours in milliseconds

## Application-specific Properties
app.name=open-app-platform
app.version=1.0.0
app.description=Application Management Service

## Custom Application Properties
app.upload.path=./uploads
app.upload.max-size=10MB
app.upload.extensions=.jpg,.jpeg,.png,.gif,.pdf,.doc,.docx

## Logging Configuration
logging.level.com.openapp=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

## Health Indicator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never