# ============================================================================
# 基准测试配置文件
# ============================================================================
# 本配置文件用于定义基准测试的各项参数
# 文件位置：config/benchmark/benchmark.yaml
# ============================================================================

# ----------------------------------------------------------------------------
# 基准测试核心配置
# ----------------------------------------------------------------------------
benchmark:
  # 预热轮次：正式测试前执行的轮次数，用于 JVM 热优化
  warmupIterations: 3
  
  # 正式测试轮次：实际用于性能统计的轮次数
  benchmarkIterations: 5
  
  # 每轮任务数：每轮迭代中执行的任务数量
  taskCount: 1000
  
  # 超时时间 (毫秒)：单个场景测试的最大执行时间
  timeoutMillis: 60000
  
  # 详细输出：是否输出详细的测试日志
  verbose: true

# ----------------------------------------------------------------------------
# 启用的测试场景
# ----------------------------------------------------------------------------
# 可选值: cpu-bound, io-bound, high-concurrency, mixed-load, recursive, async-pipeline
scenarios:
  - cpu-bound          # CPU 密集型：计算密集型任务
  - io-bound           # I/O 密集型：文件/网络 I/O 任务

# ----------------------------------------------------------------------------
# 启用的线程策略
# ----------------------------------------------------------------------------
# 可选值：platform, virtual, pool, forkjoin, completable, reactive
strategies:
  - platform           # 平台线程：传统 OS 线程 (1:1 映射)
  - virtual            # 虚拟线程：轻量级用户态线程 (M:N 映射)

# ----------------------------------------------------------------------------
# 启用的报告器
# ----------------------------------------------------------------------------
# 可选值：console, markdown, html, json
reporters:
  - console            # 控制台输出：实时显示测试结果
  - markdown           # Markdown 报告：生成 .md 格式报告
  - html               # HTML 报告：生成带样式的网页报告
  - json               # JSON 报告：生成机器可读的 JSON 格式

# ----------------------------------------------------------------------------
# 输出配置
# ----------------------------------------------------------------------------
output:
  # 输出根目录
  directory: results
  
  # 原始数据子目录：存储原始测试数据
  raw: raw
  
  # 报告子目录：存储生成的各种格式报告
  reports: reports

# ----------------------------------------------------------------------------
# 性能回归检测配置 (可选)
# ----------------------------------------------------------------------------
performance:
  # 是否启用性能回归检测
  enabled: false
  
  # 性能下降阈值 (0.05 = 5%)
  regressionThreshold: 0.05
  
  # 历史数据文件路径
  baselineFile: results/processed/baseline.json

# ----------------------------------------------------------------------------
# 验证配置 (可选)
# ----------------------------------------------------------------------------
validation:
  # 最低代码覆盖率要求
  minCoverage: 0.80
  
  # 最大错误率
  maxErrorRate: 0.001
  
  # 稳定性测试次数
  stabilityTestRuns: 3
